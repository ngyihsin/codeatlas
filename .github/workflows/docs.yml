name: docs

# Keeps the framework honest: scripts parse, and every scaffold/example INDEX.md
# Knowledge Map covers the concepts and flows authored in CONCEPTS.md / FLOWS.md.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scripts parse
        run: bash -n framework/tools/*.sh

      - name: INDEX covers all concepts and flows
        run: |
          set -e
          for dir in scaffold examples/*-onboarding-notes; do
            framework/tools/check-index.sh "$dir"
          done

  kb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install deps
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq universal-ctags ripgrep
          pip install -q pyyaml pytest
      - name: kb pipeline tests
        run: cd framework/kb && python -m pytest -q
      - name: kb incremental invariants
        run: cd framework/kb && python -m kb.incremental demo
