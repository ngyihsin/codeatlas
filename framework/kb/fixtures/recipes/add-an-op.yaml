# L3 recipe — a decision tree, not a linear checklist (the spec's point: ML-runtime
# complexity lives in the branches). Schema: id, title, task, when, decision_points[],
# steps[], pitfalls[], confidence (draft|reviewed|battle-tested).
id: add-an-op
title: Add a new operator to a backend
task: add op operator kernel register new op support
when: a model uses an op the backend does not support yet
confidence: draft        # becomes battle-tested only after a real ticket ships with it

decision_points:
  - q: Does a native op schema already exist (ONNX op / ATen op)?
    branches:
      - if: schema exists
        then: register a kernel for your provider  # -> step register_kernel
      - if: no schema (custom op)
        then: define the op + schema first, then register
  - q: Float path or quantized/HTP path?
    branches:
      - if: float
        then: standard kernel
      - if: quantized (HTP)
        then: implement the quantized builder; mind dtype/scale/zero-point handling

steps:
  - id: register_kernel
    do: >
      add the registration macro your backend uses (see ops.jsonl for examples):
      ONNX_CPU_OPERATOR_KERNEL / EXECUTORCH_LIBRARY / REGISTER_QNN_OP_BUILDER
  - do: register the op in the partitioner so the EP actually claims the node
  - do: add a unit test mirroring an existing op's test

pitfalls:    # mined from PR review comments; reverted PRs are gold
  - "forgot to register in the partitioner → node silently falls back to CPU"
  - "[seen in 1/8 PRs] dtype constraint mismatch → kernel-not-found at session init"
